<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 100%; max-width: 420px; background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 26px; }
        .login-card h2 { margin: 0 0 14px; font-size: 26px; text-align: center; color: #222; }
        .login-card p { margin: 0 0 24px; text-align: center; color: #555; }
        .login-input { width: 100%; margin-bottom: 14px; }
        .login-input input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 12px; font-size: 14px; }
        .login-buttons { display: flex; gap: 10px; margin-top: 10px; justify-content: center; flex-wrap: wrap; }
        .login-buttons button { border: none; border-radius: 6px; padding: 10px 18px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-login { background: #007bff; color: white; }
        .btn-register { background: #28a745; color: white; }
        .login-message { color: #c12d2d; text-align: center; margin-top: 8px; min-height: 20px; font-size: 13px; }
        .link-center { text-align: center; margin-top: 16px; font-size: 14px; }
        .link-center a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Bem-vindo</h2>
        <p>Digite usuário e senha para acessar sua agenda</p>
        <div class="login-input">
            <label for="usuario">Usuário</label>
            <input id="usuario" placeholder="Digite seu usuário" autocomplete="username">
        </div>
        <div class="login-input">
            <label for="senha">Senha</label>
            <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
        </div>
        <div class="login-buttons">
            <button class="btn-login" onclick="fazerLogin()">Login</button>
            <button class="btn-register" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="msg" class="login-message"></div>
        <div class="link-center">Já tem conta? <a href="index.html">Ir para Agenda</a></div>
    </div>
    <script>
        function fazerLogin() {
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const msg = document.getElementById('msg');

            if (!usuario || !senha) {
                msg.textContent = 'Preencha usuário e senha para continuar.';
                return;
            }

            msg.textContent = '';
            window.location.href = 'index.html';
        }

        function cadastrar() {
            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const msg = document.getElementById('msg');

            if (!usuario || !senha) {
                msg.textContent = 'Preencha usuário e senha para cadastrar.';
                return;
            }

            msg.textContent = '';
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
